version: "3.9"

services:
  # ── PostgreSQL + pgvector ──────────────────────────────────────────────────
  db:
    image: ankane/pgvector:latest
    container_name: agentmatch-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: agentmatch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"          # exposed so you can connect with TablePlus / pgAdmin
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agentmatch"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── pgAdmin — web-based DB browser ────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: agentmatch-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@agentmatch.io
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"            # open http://localhost:5050 to browse the DB
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./docker/pgadmin-servers.json:/pgadmin4/servers.json:ro
    depends_on:
      db:
        condition: service_healthy

  # ── Database migrations + seed (runs once, then exits) ────────────────────
  migrate:
    image: node:20-alpine
    container_name: agentmatch-migrate
    working_dir: /app
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/agentmatch
      DIRECT_URL: postgresql://postgres:postgres@db:5432/agentmatch
    # apk adds postgresql-client for the psql constraint script
    command: >
      sh -c "
        apk add --no-cache postgresql-client &&
        npm ci --quiet &&
        npx prisma migrate deploy &&
        psql postgresql://postgres:postgres@db:5432/agentmatch -f prisma/constraints.sql &&
        npx ts-node --compiler-options '{\"module\":\"CommonJS\"}' prisma/seed.ts &&
        npx ts-node --compiler-options '{\"module\":\"CommonJS\"}' prisma/seedAgents.ts
      "
    depends_on:
      db:
        condition: service_healthy

  # ── Next.js app ────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BASE_URL: http://localhost:3000
    container_name: agentmatch-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/agentmatch
      DIRECT_URL: postgresql://postgres:postgres@db:5432/agentmatch
      NEXTAUTH_SECRET: local-dev-secret-change-in-production
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_BASE_URL: http://localhost:3000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY:-}
      NEXT_PUBLIC_POSTHOG_HOST: ${NEXT_PUBLIC_POSTHOG_HOST:-https://app.posthog.com}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  pgdata:
    name: agentmatch-pgdata
  pgadmin-data:
    name: agentmatch-pgadmin
